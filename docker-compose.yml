version: "3.9"

services:
  phoenix-db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${PHOENIX_POSTGRES_USER:?Set PHOENIX_POSTGRES_USER in .env (see .env.example)}
      POSTGRES_PASSWORD: ${PHOENIX_POSTGRES_PASSWORD:?Set PHOENIX_POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${PHOENIX_POSTGRES_DB:?Set PHOENIX_POSTGRES_DB in .env}
    volumes:
      - phoenix-db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  symfony-db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${SYMFONY_POSTGRES_USER:?Set SYMFONY_POSTGRES_USER in .env (see .env.example)}
      POSTGRES_PASSWORD: ${SYMFONY_POSTGRES_PASSWORD:?Set SYMFONY_POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${SYMFONY_POSTGRES_DB:?Set SYMFONY_POSTGRES_DB in .env}
    volumes:
      - symfony-db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  phoenix:
    build:
      context: ./phoenix-api
      dockerfile: Dockerfile
      target: dev
    depends_on:
      - phoenix-db
    environment:
      DATABASE_URL: ${PHOENIX_DATABASE_URL:?Set PHOENIX_DATABASE_URL in .env (must match phoenix-db credentials)}
      SECRET_KEY_BASE: ${PHOENIX_SECRET_KEY_BASE:?Set PHOENIX_SECRET_KEY_BASE in .env}
      PHX_HOST: 0.0.0.0
      PORT: 4000
    ports:
      - "4000:4000"
    volumes:
      - ./phoenix-api:/app

  symfony:
    build:
      context: ./symfony-app
      dockerfile: Dockerfile
      target: dev
    depends_on:
      - symfony-db
      - phoenix
    environment:
      APP_ENV: dev
      APP_SECRET: ${SYMFONY_APP_SECRET:?Set SYMFONY_APP_SECRET in .env}
      AUTH_TOKEN_HMAC_SECRET: ${SYMFONY_AUTH_TOKEN_HMAC_SECRET:?Set SYMFONY_AUTH_TOKEN_HMAC_SECRET in .env}
      PHOENIX_BASE_URL: http://phoenix:4000
      DATABASE_URL: ${SYMFONY_DATABASE_URL:?Set SYMFONY_DATABASE_URL in .env (must match symfony-db credentials)}
    ports:
      - "8000:8000"
    volumes:
      - ./symfony-app:/app

volumes:
  phoenix-db-data:
  symfony-db-data:
